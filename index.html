<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">

    <title>McIntosh Reference Digital Audio Player</title>
    <meta name="author" content="Yohann Zaoui">
    <meta name="keywords" content="McIntosh, Hi-Res Audio, Digital Audio Player, Mini, HiFi, Music Player, Web App, flac, mp3, wav, music, windows, mac, apple, ipad">

    <link rel="icon" type="image/x-icon" href="assets/img/favicon.png">
    <link rel="apple-touch-icon" href="assets/img/favicon.png">
    <link rel="icon" type="image/png" href="assets/img/favicon.png">
    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="assets/fontawesome7/css/all.min.css">
</head>
<body>

    <div id="main-doors">
        <div class="door door-left">
            <img src="assets/img/McIntosh_Logo_Black_G.png" class="door-logo" alt="McIntosh">
        </div>
        <div class="door door-right">
            <button id="enter-btn">OPEN</button>
        </div>
    </div>

    <input type="file" id="audio-upload" accept=".flac,.mp3,.mp4,.wav,.m4a,.aac,.ogg" multiple>

    <div class="chassis-wrapper">
        <div class="side-trim side-left"></div>
        <div class="amplifier-panel" id="amplifier-panel">
            </div>
        <div class="side-trim side-right"></div>
    </div>

    <div id="modals-section"></div>

    <div id="drop-overlay" class="drop-overlay">
        <div class="drop-overlay-box">
            <img src="assets/img/DD_overlay_logo_mc.png" alt="McIntosh">
            <span class="drop-overlay-icon"><i class="fas fa-music"></i></span>
            <div class="drop-overlay-text">Drop your files</div>
            <div class="drop-overlay-sub">FLAC · MP3 · WAV · M4A · AAC · OGG · MP4</div>
        </div>
    </div>

    <audio id="main-audio" crossorigin="anonymous"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <script src="js/component-loader.js"></script>

    <script>
        document.addEventListener('componentsLoaded', function() {
            console.log('🎵 Composants chargés...');
            
            const audioEngine = document.createElement('script');
            audioEngine.src = 'js/mcintosh-audio-engine.js';
            document.body.appendChild(audioEngine);
            
            audioEngine.onload = function() {
                const mainScript = document.createElement('script');
                mainScript.src = 'script.js';
                document.body.appendChild(mainScript);

                // Gestion de l'ouverture des portes après chargement
                const enterBtn = document.getElementById('enter-btn');
                const doorContainer = document.getElementById('main-doors');

                enterBtn.addEventListener('click', () => {
                    doorContainer.classList.add('doors-open');
                    
                    // Initialisation du moteur audio (important pour débloquer le son sur Chrome)
                    if (window.engine && typeof engine.init === 'function') {
                        engine.init();
                    }
                });
            };
        });
    </script>

    <script data-goatcounter="https://mcinstosh.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
    
</body>
</html>
